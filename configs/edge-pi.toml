node_id = "tower-bwari-pi"
publish_topic = "caesar_tactical_intel"
loop_count = 0
fusion_window_ms = 700
threat_threshold = 0.75
ed25519_seed_hex = "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"

[location]
site = "Bwari"
latitude = 9.2797
longitude = 7.3781

[uplink]
mode = "tcp_jsonl"
